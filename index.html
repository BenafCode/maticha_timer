<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maticha</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <h1 class="tracker_id">Maticha timer</h1>
    <h2 class="tracker_sup">Stoic edition</h2>

    <div class="timer-div">
      <p id="timer">25:00</p>
    </div>

    <div class="control-buttons">
      <button id="toggle-btn" onclick="toggleTimer()" aria-label="Start or pause the timer">Start</button>
      <button onclick="resetTimer()" aria-label="Reset the timer to 25 minutes">Reset</button>
    </div>

    <div class="quote-container"></div>

    <div class="memento">
      <p>Memento Mori</p>
    </div>

    <footer>
      <h6>
        Photo by <a href="https://unsplash.com/fr/@pixel_goods?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash">Ally Griffin</a> on <a href="https://unsplash.com/fr/photos/un-crane-avec-des-fleurs-dans-la-bouche-sur-fond-noir-hdWXQGLM7ps?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash">Unsplash</a>
      </h6>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
